<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityMaster - Geographic Serious Game</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles/style.css">
</head>
<body>
  <nav id="main-nav" class="navbar">
    <div class="navbar-brand">
      <span id="logo-brand" class="logo-text" style="cursor: pointer;">CityMaster</span>
    </div>
    <div class="navbar-actions">
      <button id="theme-toggle" class="theme-toggle" title="Changer de thème"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-icon-svg"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
      <div id="nav-auth-logged-out">
        <button id="nav-login-btn" class="btn secondary">Se connecter</button>
      </div>
      <div id="nav-auth-logged-in" class="hidden">
        <a href="#" id="nav-logout-btn" class="logout-link">Se déconnecter</a>
        <a href="#" id="nav-profile-link" class="profile-link" title="Mon Profil">
          <img id="nav-profile-img" src="assets/images/default-avatar.png" alt="Avatar" class="nav-avatar hidden" />
          <span id="nav-profile-name" class="profile-name"></span>
        </a>
      </div>
    </div>
  </nav>

  <div id="app">
    <div id="loading-screen" class="screen active">
      <div class="loader-container">
        <div class="loader-spinner"></div>
        <p id="loading-message">Chargement de CityMaster...</p>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <script type="module" src="../src/app.js"></script>
</body>
</html>
