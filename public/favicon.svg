<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="230" fill="url(#grad)" />
  <!-- Stylized Map Pin -->
  <path d="M256,100 C180,100 120,160 120,236 C120,330 256,412 256,412 C256,412 392,330 392,236 C392,160 332,100 256,100 Z" fill="#ffffff" filter="url(#shadow)" />
  <!-- Center circle hole -->
  <circle cx="256" cy="220" r="50" fill="url(#grad)" />
</svg>
