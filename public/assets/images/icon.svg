<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="needleNorth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>
    <linearGradient id="needleSouth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#4f46e5" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <g filter="url(#glow)" transform="translate(256, 256)">
    <circle cx="0" cy="0" r="160" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="12" />
    <circle cx="0" cy="0" r="140" fill="none" stroke="rgba(255, 255, 255, 0.25)" stroke-width="4" stroke-dasharray="8 8" />
    
    <!-- Compass Pointer North -->
    <polygon points="0,-130 36,0 0,-20" fill="url(#needleNorth)" />
    <polygon points="0,-130 -36,0 0,-20" fill="#f87171" />
    
    <!-- Compass Pointer South -->
    <polygon points="0,130 36,0 0,20" fill="url(#needleSouth)" />
    <polygon points="0,130 -36,0 0,20" fill="#818cf8" />
    
    <circle cx="0" cy="0" r="22" fill="#ffffff" />
    <circle cx="0" cy="0" r="10" fill="#4f46e5" />
  </g>
</svg>
